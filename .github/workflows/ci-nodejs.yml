name: Reusable CI - Node.js

# Reusable CI workflow for Node.js projects following standard scripts
# Specific documentation: docs/ci-nodejs.md

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        type: string
        required: true
      package-manager:
        description: "Package manager to use (npm, pnpm, yarn). Leave empty for auto-detection."
        type: string
        required: false
        default: ""
      pnpm-version:
        description: "pnpm version used when package-manager resolves to pnpm"
        type: string
        required: false
        default: "9"

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      manager: ${{ steps.detect.outputs.manager }}
      lockfile: ${{ steps.detect.outputs.lockfile }}
      install_command: ${{ steps.detect.outputs.install_command }}
      run_command: ${{ steps.detect.outputs.run_command }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect package manager
        id: detect
        shell: bash
        run: |
          manager="${{ inputs.package-manager }}"

          set_values() {
            case "$1" in
              npm)
                lockfile="package-lock.json"
                install_command="npm ci"
                run_command="npm run"
                ;;
              pnpm)
                lockfile="pnpm-lock.yaml"
                install_command="pnpm install --frozen-lockfile"
                run_command="pnpm run"
                ;;
              yarn)
                lockfile="yarn.lock"
                install_command="yarn install --frozen-lockfile"
                run_command="yarn"
                ;;
              *)
                echo "::error::Unsupported package manager: $1. Use npm, pnpm, or yarn."
                exit 1
                ;;
            esac
          }

          if [ -z "$manager" ]; then
            detected=0

            if [ -f "package-lock.json" ]; then
              manager="npm"
              detected=$((detected + 1))
            fi

            if [ -f "pnpm-lock.yaml" ]; then
              manager="pnpm"
              detected=$((detected + 1))
            fi

            if [ -f "yarn.lock" ]; then
              manager="yarn"
              detected=$((detected + 1))
            fi

            if [ "$detected" -eq 0 ]; then
              echo "::error::No supported lockfile found. Commit package-lock.json, pnpm-lock.yaml, or yarn.lock, or set the package-manager input."
              exit 1
            fi

            if [ "$detected" -gt 1 ]; then
              echo "::error::Multiple lockfiles found. Set the package-manager input explicitly to avoid ambiguous installs."
              exit 1
            fi
          fi

          set_values "$manager"

          if [ ! -f "$lockfile" ]; then
            echo "::error::Selected package manager '$manager' requires '$lockfile', but it was not found."
            exit 1
          fi

          echo "manager=$manager" >> "$GITHUB_OUTPUT"
          echo "lockfile=$lockfile" >> "$GITHUB_OUTPUT"
          echo "install_command=$install_command" >> "$GITHUB_OUTPUT"
          echo "run_command=$run_command" >> "$GITHUB_OUTPUT"

  ci:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Typecheck
            script: typecheck
          - name: Format Check
            script: format:check
          - name: Lint
            script: lint
          - name: Tests
            script: test:run
          - name: Build
            script: build
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        if: needs.prepare.outputs.manager == 'yarn'
        run: corepack enable

      - uses: pnpm/action-setup@v4
        if: needs.prepare.outputs.manager == 'pnpm'
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ needs.prepare.outputs.manager }}
          cache-dependency-path: ${{ needs.prepare.outputs.lockfile }}

      - name: Install dependencies
        run: ${{ needs.prepare.outputs.install_command }}

      - name: Run ${{ matrix.script }}
        run: ${{ needs.prepare.outputs.run_command }} ${{ matrix.script }}
